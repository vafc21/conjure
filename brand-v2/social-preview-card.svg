<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!--
    Conjure Social Preview Card (1200×630)
    Uses Direction A (Materializing Frame) as the primary icon.
    Warm paper background, dark ink text, clay-red accent.
  -->
  <!-- Background -->
  <rect width="1200" height="630" fill="#e7e0d2"/>

  <!-- Subtle decorative dissolve dots — background texture -->
  <rect x="300" y="120" width="8" height="8" fill="#26231d" opacity="0.04"/>
  <rect x="900" y="500" width="8" height="8" fill="#26231d" opacity="0.04"/>
  <rect x="350" y="480" width="8" height="8" fill="#26231d" opacity="0.04"/>
  <rect x="850" y="150" width="8" height="8" fill="#26231d" opacity="0.04"/>
  <rect x="150" y="300" width="8" height="8" fill="#26231d" opacity="0.04"/>
  <rect x="1050" y="320" width="8" height="8" fill="#26231d" opacity="0.04"/>
  <rect x="550" y="100" width="8" height="8" fill="#26231d" opacity="0.04"/>
  <rect x="650" y="520" width="8" height="8" fill="#26231d" opacity="0.04"/>

  <!-- Logo icon — Direction A Materializing Frame at 3× scale -->
  <!-- Frame solid portions -->
  <path d="M560 240 L640 240 A24 24 0 0 1 664 264 L664 336" stroke="#26231d" stroke-width="12" stroke-linecap="round"/>
  <path d="M560 240 A24 24 0 0 0 536 264 L536 408 A24 24 0 0 0 560 432 L624 432" stroke="#26231d" stroke-width="12" stroke-linecap="round"/>
  <!-- Dissolve dots — right edge -->
  <rect x="652" y="348" width="12" height="12" fill="#26231d"/>
  <rect x="652" y="372" width="12" height="12" fill="#26231d"/>
  <rect x="652" y="404" width="12" height="12" fill="#26231d"/>
  <!-- Dissolve dots — bottom edge -->
  <rect x="636" y="420" width="12" height="12" fill="#26231d"/>
  <rect x="660" y="420" width="12" height="12" fill="#26231d"/>
  <rect x="590" y="420" width="12" height="12" fill="#26231d"/>
  <rect x="614" y="420" width="12" height="12" fill="#26231d"/>
  <!-- Corner scatter -->
  <rect x="676" y="368" width="12" height="12" fill="#26231d"/>
  <rect x="664" y="388" width="12" height="12" fill="#26231d"/>
  <rect x="676" y="412" width="12" height="12" fill="#26231d"/>

  <!-- Wordmark -->
  <text x="600" y="510" text-anchor="middle"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="80" font-weight="700" fill="#26231d"
        letter-spacing="-0.03em">Conjure<span font-weight="800" fill="#b2482b">.</span></text>

  <!-- Tagline -->
  <text x="600" y="555" text-anchor="middle"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="28" font-weight="400" fill="#b2482b"
        letter-spacing="0.08em">DRAW IT. WATCH IT RUN.</text>
</svg>
